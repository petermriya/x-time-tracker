<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>X Time Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      padding: 20px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: #000;
      font-family: 'Space Mono', monospace;
    }

    .title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-grow: 1;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }
    .status-dot.active { background: #4caf50; box-shadow: 0 0 8px rgba(76, 175, 80, 0.5); }

    .main-stats {
      background: #121212;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    .label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .time-large {
      font-size: 32px;
      font-weight: 300;
      font-family: 'Space Mono', monospace;
      color: #fff;
    }
    .time-large span { font-size: 16px; color: #666; }

    .limit-note {
      font-size: 11px;
      color: #ff4d4d;
      margin-top: 8px;
      display: none;
    }
    
    .limit-note.show { display: block; }

    .summary-box {
      background: #121212;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .summary-box .time-large { font-size: 20px; }

    .section-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-row {
      display: flex;
      align-items: center;
      font-size: 12px;
    }
    .history-date { width: 50px; color: #888; }
    .history-time { width: 45px; text-align: right; color: #ccc; font-family: 'Space Mono', monospace; }
    
    .bar-wrap {
      flex-grow: 1;
      height: 4px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
      margin: 0 10px;
    }
    .bar-fill {
      height: 100%;
      background: #e2e8ff;
      border-radius: 2px;
      transition: width 0.4s;
    }

    .empty {
      text-align: center;
      color: #333;
      font-size: 12px;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">𝕏</div>
    <div class="title">Time Tracker</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="main-stats">
    <div class="label" id="currentNote">Today</div>
    <div class="time-large" id="todayTime">0<span>h</span> 0<span>m</span></div>
    <div class="limit-note" id="limitNote">1 Hour Limit Reached!</div>
  </div>

  <div class="summary-box">
    <div class="label" style="margin:0;">7-Day Total</div>
    <div class="time-large" id="weeklyTotal">0<span>h</span> 0<span>m</span></div>
  </div>

  <div class="section-title">Past 6 Days</div>
  <div class="history-list" id="historyList"></div>

  <script src="popup.js"></script>
</body>
</html>
